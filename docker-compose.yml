services:
    database:
        image: postgres:18
        container_name: database
        restart: unless-stopped
        environment:
            POSTGRES_DB: bayesian_adhd
            POSTGRES_USER: db_user
            POSTGRES_PASSWORD: db_password
        ports:
            - "5432:5432"
        volumes:
            - postgres_data:/var/lib/postgresql
            - ./backend/app/db/schema.sql:/docker-entrypoint-initdb.d/init.sql:ro
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U db_user -d bayesian_adhd"]
            interval: 5s
            timeout: 5s
            retries: 5

    backend:
        build:
            context: ./backend
            dockerfile: Dockerfile
            target: development
        container_name: backend
        restart: unless-stopped
        environment:
            # Flask config
            FLASK_ENV: development
            FLASK_DEBUG: "1"
            # Database connection
            DATABASE_HOST: database
            DATABASE_PORT: 5432
            DATABASE_USER: db_user
            DATABASE_PASSWORD: db_password
            DATABASE_NAME: bayesian_adhd
        env_file:
            - ./backend/.env
        ports:
            - "8000:8000"
        depends_on:
            database:
                condition: service_healthy
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:8000/"]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 30s
        volumes:
            - ./backend:/app:cached
            - backend_exports:/app/exports
            - /app/venv
            - /app/__pycache__

    cloudflared:
        image: cloudflare/cloudflared:latest
        container_name: cloudflared
        profiles:
            - cloudflare
        command: tunnel run
        environment:
            - TUNNEL_TOKEN=${TUNNEL_TOKEN}
        restart: unless-stopped
        depends_on:
            - backend

volumes:
    postgres_data:
    backend_exports:
