<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BayesADHD - Clinician Login</title>
    <link rel="icon" type="image/png" href="/static/images/icon.png" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
    <link rel="stylesheet" href="/static/login.css" />
</head>

<body>
    <div class="login-shell">
        <aside class="login-brand-panel" aria-label="Application overview">
            <div class="brand-top">
                <h2 class="brand-title">BayesianADHD</h2>
                <p class="brand-copy">A clinical support tool for ADHD and ADHD subtype assessment, utilizing an CNN-LSTM neural network optimized via Bayesian Optimization</p>
            </div>
        </aside>

        <main class="login-main">
                <section class="login-form-panel" aria-label="Clinician login form">
                    <h1>Clinician Login</h1>
                    <p>Sign in to continue to the BayesADHD dashboard.</p>

                    <div id="error-message" class="alert" style="display: none;"></div>

                    <form id="login-form" class="login-form">
                        <div class="form-group">
                            <label for="username" class="form-label">Username</label>
                            <input type="text" id="username" name="username" class="form-control" placeholder="Enter your username"
                                maxlength="150" required autocomplete="username" />
                        </div>

                        <div class="form-group">
                            <label for="password" class="form-label">Password</label>
                            <div class="password-wrap">
                                <input type="password" id="password" name="password" class="form-control" placeholder="Enter your password"
                                    maxlength="128" required autocomplete="current-password" />
                                <button type="button" id="toggle-password" class="password-toggle" aria-label="Show password">
                                    <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                                        fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                        <circle cx="12" cy="12" r="3"></circle>
                                    </svg>
                                </button>
                            </div>
                        </div>

                        <button type="submit" class="btn-login" id="login-btn">
                            <span class="loading-spinner" aria-hidden="true"></span>
                            <span>Sign In</span>
                        </button>
                    </form>

                </section>
        </main>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error-message');
            const loginBtn = document.getElementById('login-btn');

            errorDiv.style.display = 'none';
            errorDiv.textContent = '';

            if (!username || !password) {
                errorDiv.textContent = 'Please enter both username and password.';
                errorDiv.style.display = 'block';
                return;
            }

            loginBtn.disabled = true;
            loginBtn.classList.add('loading');

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        username: username,
                        password: password
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    sessionStorage.setItem('clinician_name', data.clinician_name);
                    sessionStorage.setItem('clinician_occupation', data.clinician_occupation || '');
                    window.location.href = '/index.html';
                } else {
                    errorDiv.textContent = data.error || 'Invalid username or password.';
                    errorDiv.style.display = 'block';
                    loginBtn.disabled = false;
                    loginBtn.classList.remove('loading');
                }
            } catch (error) {
                console.error('Error during login:', error);
                errorDiv.textContent = 'An error occurred during login. Please try again.';
                errorDiv.style.display = 'block';
                loginBtn.disabled = false;
                loginBtn.classList.remove('loading');
            }
        });

        document.getElementById('username').focus();

        document.getElementById('toggle-password').addEventListener('click', function () {
            const pwd = document.getElementById('password');
            const eye = document.getElementById('eye-icon');
            if (pwd.type === 'password') {
                pwd.type = 'text';
                eye.innerHTML = '<path d="M17.94 17.94A10.94 10.94 0 0 1 12 20c-7 0-11-8-11-8a21.86 21.86 0 0 1 5.06-6.06"/><path d="M1 1l22 22"/>';
            } else {
                pwd.type = 'password';
                eye.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
            }
        });
    </script>
</body>

</html>
