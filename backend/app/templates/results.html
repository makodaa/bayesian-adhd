<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Assessment History - BayesianADHD</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <style>
      :root {
        --brand-900: #14323f;
        --brand-800: #1b4658;
        --brand-700: #225c72;
        --brand-600: #2b718c;
        --brand-500: #3f8dab;
        --surface-bg: #eef3f5;
        --surface-shell: #f8fbfd;
        --surface-card: #ffffff;
        --surface-muted: #f5f8fa;
        --border-shell: #c6d8e3;
        --border-card: #dbe3e8;
        --border-soft: #d4dde3;
        --text-900: #1f2f39;
        --text-700: #3f515d;
        --text-500: #607484;
        --success-600: #2e7d66;
        --warning-600: #b56f2a;
        --error-600: #b4494f;
        --shadow-card: 0 8px 22px rgba(20, 50, 63, 0.05);
        --shadow-shell: 0 10px 24px rgba(20, 50, 63, 0.06);
        --shadow-soft: 0 12px 30px rgba(20, 50, 63, 0.08);
        --focus-ring: 0 0 0 3px rgba(43, 113, 140, 0.35);
        --radius-xs: 4px;
        --radius-sm: 6px;
        --radius-md: 8px;
        --radius-pill: 999px;
        --sidebar-width: 82px;
        --content-width: 1240px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Aptos", "Calibri", "Segoe UI", "Helvetica Neue", sans-serif;
        color: var(--text-900);
        background: radial-gradient(circle at 15% -10%, #f7fbfd 0%, var(--surface-bg) 45%, #e8eef2 100%);
      }

      button,
      input,
      select,
      textarea {
        font-family: inherit;
      }

      button:focus-visible,
      input:focus-visible,
      select:focus-visible,
      textarea:focus-visible,
      a:focus-visible {
        outline: none;
        box-shadow: var(--focus-ring);
      }

      .toast-container {
        position: fixed;
        top: 1rem;
        left: 50%;
        transform: translateX(-50%);
        z-index: 2300;
        width: min(90vw, 560px);
        display: grid;
        gap: 0.6rem;
        pointer-events: none;
      }

      .toast-message {
        background: #183945;
        color: #f4f9fb;
        border-radius: var(--radius-md);
        padding: 0.85rem 1rem;
        box-shadow: var(--shadow-soft);
        border: 1px solid rgba(255, 255, 255, 0.2);
        font-size: 0.92rem;
        line-height: 1.4;
        opacity: 0;
        transform: translateY(-8px);
        animation: toast-enter 180ms ease-out forwards;
      }

      .toast-message.success {
        background: #1f604f;
      }

      .toast-message.warning {
        background: #7f521e;
      }

      .toast-message.error {
        background: #7f3034;
      }

      @keyframes toast-enter {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .sidebar-backdrop {
        position: fixed;
        inset: 0;
        background: rgba(15, 32, 40, 0.45);
        opacity: 0;
        pointer-events: none;
        transition: opacity 180ms ease-out;
        z-index: 1400;
      }

      .sidebar-backdrop.open {
        opacity: 1;
        pointer-events: auto;
      }

      .app-shell {
        display: flex;
        min-height: 100vh;
      }

      .app-sidebar {
        width: var(--sidebar-width);
        flex-shrink: 0;
        height: 100vh;
        position: sticky;
        top: 0;
        background: linear-gradient(180deg, var(--brand-900) 0%, #173f50 100%);
        color: #e5f2f7;
        border-right: 1px solid rgba(255, 255, 255, 0.08);
        display: flex;
        flex-direction: column;
        padding: 1rem 0.65rem;
        z-index: 1200;
      }

      .sidebar-brand {
        display: flex;
        justify-content: center;
        align-items: center;
        margin-bottom: 1.2rem;
      }

      .brand-mark {
        display: inline-flex;
        width: 42px;
        height: 42px;
        border-radius: var(--radius-md);
        align-items: center;
        justify-content: center;
        background: linear-gradient(145deg, #4b9ab8, #2f6e86);
        font-weight: 700;
        letter-spacing: 0.04em;
        color: #f5fbfe;
      }

      .sidebar-nav {
        flex: 1;
        display: grid;
        gap: 0.35rem;
      }

      .sidebar-link {
        width: 100%;
        border-radius: var(--radius-sm);
        color: #d6eaf2;
        text-decoration: none;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 48px;
        transition: background-color 170ms ease-out, color 170ms ease-out;
      }

      .sidebar-link:hover {
        background: rgba(255, 255, 255, 0.08);
        color: #ffffff;
      }

      .sidebar-link.active {
        background: rgba(105, 185, 214, 0.27);
        color: #ffffff;
        box-shadow: inset 0 0 0 1px rgba(182, 228, 243, 0.35);
      }

      .sidebar-link svg {
        width: 22px;
        height: 22px;
        stroke-width: 1.7;
      }

      .sidebar-link span {
        position: absolute;
        opacity: 0;
        pointer-events: none;
      }

      .sidebar-footer {
        border-top: 1px solid rgba(230, 246, 253, 0.2);
        padding-top: 0.8rem;
        text-align: center;
      }

      .sidebar-user-label {
        margin: 0;
        color: rgba(230, 246, 253, 0.74);
        font-size: 0.68rem;
        letter-spacing: 0.05em;
        text-transform: uppercase;
      }

      .sidebar-user-name {
        margin: 0.25rem 0 0.65rem;
        font-size: 0.78rem;
        color: #f0f9fc;
        word-break: break-word;
        line-height: 1.3;
      }

      .sidebar-logout {
        border: 1px solid rgba(220, 243, 250, 0.5);
        color: #f0f9fc;
        background: transparent;
        border-radius: var(--radius-sm);
        padding: 0.32rem 0.7rem;
        font-size: 0.76rem;
        font-weight: 600;
        transition: background-color 170ms ease-out;
      }

      .sidebar-logout:hover {
        background: rgba(240, 249, 252, 0.14);
      }

      .app-main {
        flex: 1;
        min-width: 0;
        max-height: 100vh;
        overflow: auto;
      }

      .page-header {
        position: sticky;
        top: 0;
        z-index: 900;
        backdrop-filter: blur(8px);
        background: rgba(238, 243, 245, 0.92);
        border-bottom: 1px solid #dbe3e8;
      }

      .page-header-inner {
        max-width: calc(var(--content-width) + 3rem);
        margin: 0 auto;
        padding: 1.05rem 1.5rem;
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 1rem;
      }

      .page-title-group {
        display: flex;
        gap: 0.85rem;
        align-items: flex-start;
      }

      .menu-toggle {
        border: 1px solid var(--border-soft);
        background: #fff;
        border-radius: var(--radius-sm);
        width: 40px;
        height: 40px;
        display: none;
        align-items: center;
        justify-content: center;
        color: var(--brand-800);
        flex-shrink: 0;
      }

      .page-title-group h1 {
        margin: 0;
        font-size: 1.42rem;
        font-weight: 700;
        color: var(--text-900);
      }

      .page-title-group p {
        margin: 0.35rem 0 0;
        color: var(--text-700);
        font-size: 0.94rem;
        max-width: 760px;
      }

      .page-actions {
        display: flex;
        align-items: center;
        gap: 0.55rem;
        flex-shrink: 0;
      }

      .btn-primary-app,
      .btn-secondary-app {
        border: none;
        border-radius: var(--radius-sm);
        padding: 0 1rem;
        height: 36px;
        font-size: 0.91rem;
        font-weight: 600;
        display: inline-flex;
        align-items: center;
        white-space: nowrap;
        transition: transform 170ms ease-out, box-shadow 170ms ease-out, background-color 170ms ease-out;
      }

      .btn-primary-app {
        background: linear-gradient(140deg, var(--brand-700), var(--brand-600));
        color: #f6fbfd;
        box-shadow: 0 6px 14px rgba(35, 98, 120, 0.25);
      }

      .btn-primary-app:hover:not(:disabled) {
        transform: translateY(-1px);
        box-shadow: 0 8px 20px rgba(35, 98, 120, 0.32);
      }

      .btn-secondary-app {
        background: #f9fcfd;
        color: var(--brand-700);
        border: 1px solid var(--border-soft);
      }

      .btn-secondary-app:hover:not(:disabled) {
        background: #f0f6f9;
      }

      .btn-primary-app:disabled,
      .btn-secondary-app:disabled {
        opacity: 0.55;
        cursor: not-allowed;
        transform: none;
        box-shadow: none;
      }

      .page-body {
        max-width: var(--content-width);
        margin: 0 auto;
        padding: 1.5rem;
        display: grid;
        gap: 1rem;
      }

      .section-shell {
        background: var(--surface-card);
        border: 1px solid var(--border-card);
        border-radius: var(--radius-md);
        box-shadow: var(--shadow-card);
      }

      .section-head {
        padding: 1rem 1rem 0.5rem;
        display: grid;
        gap: 0.3rem;
      }

      .section-head h2 {
        margin: 0;
        font-size: 1.02rem;
        color: var(--text-900);
      }

      .section-head p {
        margin: 0;
        font-size: 0.86rem;
        color: var(--text-700);
        line-height: 1.45;
      }

      .hidden {
        display: none !important;
      }

      @media (max-width: 992px) {
        .app-sidebar {
          width: 250px;
          position: fixed;
          transform: translateX(-100%);
          transition: transform 190ms ease-out;
          padding: 1rem;
        }

        .app-sidebar.mobile-open {
          transform: translateX(0);
        }

        .sidebar-link {
          justify-content: flex-start;
          gap: 0.65rem;
          padding: 0 0.7rem;
        }

        .sidebar-link span {
          position: static;
          opacity: 1;
          pointer-events: auto;
          font-size: 0.89rem;
          font-weight: 600;
        }

        .sidebar-footer {
          text-align: left;
        }

        .menu-toggle {
          display: inline-flex;
        }
      }

      @media (max-width: 768px) {
        .page-header-inner,
        .page-body {
          padding-left: 1rem;
          padding-right: 1rem;
        }

        .page-header-inner {
          flex-direction: column;
          align-items: stretch;
        }

        .page-actions {
          justify-content: flex-end;
          flex-wrap: wrap;
        }
      }
    </style>
  </head>

  <body>
    <div id="toast-container" class="toast-container" aria-live="assertive" aria-atomic="true"></div>
    <div id="sidebar-backdrop" class="sidebar-backdrop"></div>

    <div class="app-shell">
      <aside class="app-sidebar" id="sidebar" aria-label="Primary navigation">
        <div class="sidebar-brand">
          <span class="brand-mark">BA</span>
        </div>

        <nav class="sidebar-nav">
          <a href="/index.html" class="sidebar-link" title="Dashboard" aria-label="Dashboard">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
              <polyline points="9 22 9 12 15 12 15 22"></polyline>
            </svg>
            <span>Dashboard</span>
          </a>
          <a href="/subjects.html" class="sidebar-link" title="Subjects" aria-label="Subjects">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
              <circle cx="9" cy="7" r="4"></circle>
              <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
              <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
            </svg>
            <span>Subjects</span>
          </a>
          <a href="/results.html" class="sidebar-link active" title="Assessments" aria-label="Assessments">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
              <polyline points="14 2 14 8 20 8"></polyline>
              <line x1="16" y1="13" x2="8" y2="13"></line>
              <line x1="16" y1="17" x2="8" y2="17"></line>
            </svg>
            <span>Assessments</span>
          </a>
          <a href="/clinicians.html" class="sidebar-link" title="Clinicians" aria-label="Clinicians">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
              <circle cx="12" cy="7" r="4"></circle>
            </svg>
            <span>Clinicians</span>
          </a>
        </nav>

        <div class="sidebar-footer">
          <p class="sidebar-user-label">Signed in as</p>
          <p class="sidebar-user-name" id="sidebar-clinician-name">Clinician</p>
          <button id="logout-btn" class="sidebar-logout" type="button">Logout</button>
        </div>
      </aside>

      <div class="app-main">
        <header class="page-header">
          <div class="page-header-inner">
            <div class="page-title-group">
              <button id="sidebar-toggle" class="menu-toggle" type="button" aria-label="Toggle navigation menu">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                  <line x1="3" y1="6" x2="21" y2="6"></line>
                  <line x1="3" y1="12" x2="21" y2="12"></line>
                  <line x1="3" y1="18" x2="21" y2="18"></line>
                </svg>
              </button>
              <div>
                <h1>Assessment History</h1>
                <p>Full log of EEG classifications with filtering and result detail access.</p>
              </div>
            </div>
            <div class="page-actions">
              <button id="export-results-btn" type="button" class="btn-secondary-app">Export Results</button>
            </div>
          </div>
        </header>

        <main class="page-body">
          <section class="section-shell">
            <div class="section-head">
              <h2>Assessment Log</h2>
              <p>All EEG classification records. Click a row to open the full result detail.</p>
            </div>
          </section>
        </main>
      </div>
    </div>

    <script>
      // ── Utilities ──

      function byId(id) {
        return document.getElementById(id);
      }

      function showToast(message, variant = 'error') {
        const container = byId('toast-container');
        if (!container) return;
        const toast = document.createElement('div');
        toast.className = `toast-message ${variant}`;
        toast.textContent = message;
        container.appendChild(toast);
        window.setTimeout(() => {
          toast.style.opacity = '0';
          toast.style.transform = 'translateY(-8px)';
          window.setTimeout(() => toast.remove(), 180);
        }, 6000);
      }

      // ── Shell bootstrap ──

      async function loadCurrentClinician() {
        try {
          const res = await fetch('/api/me');
          if (res.status === 401 || !res.ok) { window.location.href = '/login.html'; return; }
          const data = await res.json();
          const el = byId('sidebar-clinician-name');
          if (el && data.clinician_name) el.textContent = data.clinician_name;
        } catch { window.location.href = '/login.html'; }
      }

      function toggleMobileSidebar(open) {
        const sidebar = byId('sidebar');
        const backdrop = byId('sidebar-backdrop');
        if (!sidebar || !backdrop) return;
        const shouldOpen = typeof open === 'boolean' ? open : !sidebar.classList.contains('mobile-open');
        sidebar.classList.toggle('mobile-open', shouldOpen);
        backdrop.classList.toggle('open', shouldOpen);
      }

      async function handleLogout() {
        try {
          await fetch('/api/logout', { method: 'POST' });
        } finally {
          window.location.href = '/login.html';
        }
      }

      byId('sidebar-toggle')?.addEventListener('click', () => toggleMobileSidebar());
      byId('sidebar-backdrop')?.addEventListener('click', () => toggleMobileSidebar(false));
      byId('logout-btn')?.addEventListener('click', handleLogout);

      // ── Init ──

      document.addEventListener('DOMContentLoaded', loadCurrentClinician);
    </script>
  </body>
</html>
